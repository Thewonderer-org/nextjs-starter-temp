apiVersion: apps/v1
kind: Deployment
metadata:
  name: <+service.name>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: <+service.name>
  template:
    metadata:
      labels:
        app: <+service.name>
    spec:
      containers:
      - name: app
        image: hashicorp/http-echo:latest
        args:
          - "-text=Hello from {{cookiecutter.app_name}}! Deployed via Harness IDP. Owner: {{cookiecutter.owner}}"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: <+service.name>
spec:
  selector:
    app: <+service.name>
  ports:
  - port: 80
    targetPort: 5678
  type: LoadBalancer
